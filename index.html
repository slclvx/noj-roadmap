<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1" />

    <title>NOJ Path</title>
    <meta name="description" content="The road to becoming the first foreign CEO of Nintendo of Japan." />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FF5C75" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0A0D1A" media="(prefers-color-scheme: dark)" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NOJ Path" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

    <style>
      * { -webkit-tap-highlight-color: transparent; }
      html, body {
        margin: 0;
        padding: 0;
        overscroll-behavior-y: contain;
        background: #0A0D1A;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body { touch-action: manipulation; }
      input, textarea, select { font-size: 16px !important; } /* prevent iOS zoom */
      #root { min-height: 100vh; min-height: 100dvh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/service-worker.js")
            .catch((err) => console.log("SW failed", err));
        });
      }
    </script>
  </body>
</html>
